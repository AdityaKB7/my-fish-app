<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fish Weight AI Predictor</title>
    <style>
        :root {
            --primary-color: #06b6d4;
            --primary-hover: #0891b2;
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --input-bg: #0b1120;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, #020617 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 30px rgba(6, 182, 212, 0.05);
            width: 100%;
            max-width: 480px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-sizing: border-box;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .fish-icon {
            color: var(--primary-color);
            margin-bottom: 10px;
            filter: drop-shadow(0 0 8px rgba(6, 182, 212, 0.4));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        .header h1 {
            margin: 0 0 8px 0;
            font-size: 1.8rem;
            color: var(--text-main);
            letter-spacing: -0.5px;
        }

        .header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .input-group input::placeholder {
            color: #475569;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(6, 182, 212, 0.15);
        }

        .input-row {
            display: flex;
            gap: 12px;
        }

        .input-row .input-group {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 16px;
            background-color: var(--primary-color);
            color: #020617;
            border: none;
            border-radius: 10px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 14px rgba(6, 182, 212, 0.3);
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #334155;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #result-box {
            margin-top: 25px;
            padding: 20px;
            border-radius: 12px;
            background-color: rgba(6, 182, 212, 0.05);
            border: 1px solid rgba(6, 182, 212, 0.2);
            text-align: center;
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #result-value {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--primary-color);
            margin: 5px 0;
            text-shadow: 0 0 20px rgba(6, 182, 212, 0.3);
        }

        .error-message {
            background-color: rgba(239, 68, 68, 0.1) !important;
            border-color: rgba(239, 68, 68, 0.3) !important;
        }
        
        .error-message #result-value {
            color: #ef4444;
            text-shadow: none;
            font-size: 1.2rem;
            margin-top: 10px;
        }

        /* Mobile specific adjustments */
        @media (max-width: 400px) {
            .container {
                padding: 25px 20px;
            }
            .input-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="fish-icon">
                <path d="M6.5 12c.94-3.46 4.94-6 8.5-6 3.56 0 6.06 2.54 7 6-.94 3.47-3.44 6-7 6s-7.56-2.53-8.5-6Z"/>
                <path d="M18 12v.01"/>
                <path d="M11.5 10.5c-1-3.14-1.18-4.6-4-6"/>
                <path d="M5.65 10.9A11.08 11.08 0 0 1 2 12c3.65 1.1 4.54 1.76 6.5 5"/>
            </svg>
            <h1>Fish Weight AI</h1>
            <p>Neural analysis of marine dimensions</p>
        </div>

        <form id="prediction-form">
            
            <div class="input-group">
                <label for="species">Species Classification</label>
                <select id="species" required>
                    <option value="" disabled selected>Select species...</option>
                    <option value="Bream">Bream</option>
                    <option value="Roach">Roach</option>
                    <option value="Whitefish">Whitefish</option>
                    <option value="Parkki">Parkki</option>
                    <option value="Smelt">Smelt</option>
                    <option value="Pike">Pike</option>
                    <option value="Perch">Perch</option>
                </select>
            </div>

            <div class="input-group">
                <label for="length1">Standard Length (Nose to Tail Base)</label>
                <input type="number" id="length1" step="0.1" required placeholder="cm">
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="length2">Fork Length</label>
                    <input type="number" id="length2" step="0.1" required placeholder="cm">
                </div>
                <div class="input-group">
                    <label for="length3">Total Length</label>
                    <input type="number" id="length3" step="0.1" required placeholder="cm">
                </div>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label for="height">Maximum Height</label>
                    <input type="number" id="height" step="0.01" required placeholder="cm">
                </div>
                <div class="input-group">
                    <label for="width">Maximum Width</label>
                    <input type="number" id="width" step="0.01" required placeholder="cm">
                </div>
            </div>

            <button type="submit" id="submit-btn">Initialize Prediction</button>
        </form>

        <div id="result-box">
            <div style="font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase;">Estimated Mass</div>
            <div id="result-value">--</div>
            <div style="font-size: 0.8rem; color: var(--text-muted);">grams</div>
        </div>
    </div>

    <script>
        document.getElementById('prediction-form').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            const btn = document.getElementById('submit-btn');
            const resultBox = document.getElementById('result-box');
            const resultValue = document.getElementById('result-value');
            
            btn.disabled = true;
            btn.innerText = 'Analyzing Data...';
            resultBox.style.display = 'none';
            resultBox.classList.remove('error-message');

            const payload = {
                species: document.getElementById('species').value,
                length1: parseFloat(document.getElementById('length1').value),
                length2: parseFloat(document.getElementById('length2').value),
                length3: parseFloat(document.getElementById('length3').value),
                height: parseFloat(document.getElementById('height').value),
                width: parseFloat(document.getElementById('width').value)
            };

            try {
                const response = await fetch('/api/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok && !data.error) {
                    resultValue.innerText = data.predicted_weight + ' g';
                    resultBox.style.display = 'block';
                } else {
                    throw new Error(data.error || 'Failed to get prediction');
                }
            } catch (error) {
                resultValue.innerText = "Prediction Failed";
                resultBox.innerHTML = `<div style="color: #ef4444; font-weight: 600; font-size: 0.9rem;">Analysis Error</div><div style="font-size:0.85rem; margin-top:8px; color: var(--text-main);">${error.message}</div>`;
                resultBox.classList.add('error-message');
                resultBox.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.innerText = 'Initialize Prediction';
            }
        });
    </script>
</body>
</html>
